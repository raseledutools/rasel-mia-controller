<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    <title>RasScanner Pro Max</title>
    
    <script src="tailwindcss.js"></script>
    <script src="jspdf.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        
        .toast-enter { animation: slideUp 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .toggle-checkbox:checked { right: 0; border-color: #4F46E5; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4F46E5; }
        
        /* Native Scrolling for PDF Viewer */
        #pdfViewerContainer { 
            position: relative; overflow: auto; 
            width: 100%; height: 100%; 
            background-color: #d1d5db;
        }
        #pdfPagesList { text-align: center; padding: 16px; }
        .pdf-canvas-page {
            display: inline-block;
            width: 100%; 
            max-width: none !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin-bottom: 16px;
            background-color: white;
            transition: width 0.1s ease-out; 
        }

        .highlight-file { animation: highlightGlow 2s ease-out; }
        @keyframes highlightGlow {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7); }
            70% { box-shadow: 0 0 10px 10px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
    </style>
</head>
<body class="bg-slate-800 h-screen w-screen flex justify-center sm:items-center font-sans text-gray-800 overflow-hidden select-none">

    <div class="relative w-full h-full sm:max-w-[420px] sm:h-[840px] sm:max-h-[95vh] bg-gray-50 sm:rounded-[2.5rem] sm:shadow-2xl sm:border-[10px] sm:border-gray-950 flex flex-col overflow-hidden">
        
        <header class="bg-indigo-600 px-5 h-16 flex items-center justify-between shadow-lg z-30 shrink-0">
            <div class="flex items-center gap-2.5 text-white">
                <svg class="w-8 h-8 text-indigo-100" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><circle cx="10" cy="12" r="2"/><path d="m20 17-1.296-1.296a2.41 2.41 0 0 0-3.408 0L9 22"/></svg>
                <span class="font-black text-2xl tracking-tight text-white">Ras<span class="text-indigo-200">Scanner</span></span>
            </div>
            <button id="topActionBtn" onclick="clearAllImages()" class="hidden text-xs font-bold text-indigo-700 bg-white hover:bg-indigo-50 px-4 py-2 rounded-full active:scale-95 transition-all shadow">
                Clear Grid
            </button>
        </header>

        <main id="mainScrollView" class="flex-1 overflow-y-auto relative block bg-gradient-to-b from-gray-50 to-gray-100 p-4 pb-24">
            
            <div class="grid grid-cols-3 gap-3 mb-6">
                <button onclick="openCustomCamera()" class="col-span-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-2xl flex flex-col items-center justify-center gap-1.5 shadow-lg active:scale-95 transition-all text-xs">
                    <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    Camera
                </button>
                <button onclick="document.getElementById('fileInput').click()" class="col-span-1 bg-white hover:bg-gray-50 border border-indigo-100 text-indigo-700 font-bold py-3.5 rounded-2xl flex flex-col items-center justify-center gap-1.5 shadow-sm active:scale-95 transition-all text-xs">
                    <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/><circle cx="9" cy="9" r="2"/><path d="M16 5h6"/><path d="M19 2v6"/></svg>
                    Gallery
                </button>
                <button onclick="document.getElementById('pdfInput').click()" class="col-span-1 bg-white hover:bg-gray-50 border border-emerald-200 text-emerald-600 font-bold py-3.5 rounded-2xl flex flex-col items-center justify-center gap-1.5 shadow-sm active:scale-95 transition-all text-xs">
                    <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M15 18a3 3 0 1 0-6 0"/><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M12 13v5"/></svg>
                    Import PDF
                </button>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-lg border border-gray-100 mb-6 transition-all duration-300">
                <div class="space-y-4">
                    <div class="flex items-center justify-between bg-indigo-50/50 p-3 rounded-2xl border border-indigo-100">
                        <label class="text-sm font-bold text-gray-800 flex items-center gap-2" for="autoCrop">
                            <svg class="w-4 h-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
                            Smart Auto Crop
                        </label>
                        <div class="relative inline-block w-12 mr-2 align-middle select-none">
                            <input type="checkbox" id="autoCrop" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10" checked/>
                            <label for="autoCrop" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                        </div>
                    </div>

                    <div class="flex flex-col gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Pro Image Filter</label>
                            <div class="relative">
                                <select id="imageFilter" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-900 text-sm font-bold rounded-2xl focus:ring-2 focus:ring-indigo-200 block p-3.5 pr-10 outline-none transition-all">
                                    <option value="none">Original (Pure HD Quality)</option>
                                    <option value="magic-pro" selected>Magic Pro (Warm Eye Care & Crisp)</option>
                                    <option value="print-pro">Print Pro (B&W + Color Signature)</option>
                                    <option value="clear-pro">Clear Pro (Shadow Remover)</option>
                                    <option value="super-bw">Super B&W (Old Documents)</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3.5 text-gray-500">
                                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                                </div>
                            </div>
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Page Size</label>
                            <div class="relative">
                                <select id="pageSize" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-900 text-sm font-bold rounded-2xl focus:ring-2 focus:ring-indigo-200 block p-3.5 pr-10 outline-none transition-all">
                                    <option value="fit" selected>Fit to Image (Max Quality)</option>
                                    <option value="a4">A4 Size Document</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3.5 text-gray-500">
                                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="imageGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6">
                <div id="emptyState" class="col-span-full flex flex-col items-center justify-center py-16 text-gray-500 bg-white/70 rounded-3xl border-2 border-dashed border-gray-300 shadow-inner">
                    <div class="w-20 h-20 bg-gray-100 text-indigo-400 rounded-full flex items-center justify-center mb-4 shadow-md border border-gray-200">
                        <svg class="w-10 h-10" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    </div>
                    <h3 class="font-bold text-xl text-gray-800">No Images Selected</h3>
                    <p class="text-xs mt-1 text-center font-medium text-gray-500">Capture, upload or import PDF.</p>
                </div>
            </div>

            <button id="btnGeneratePDF" onclick="generatePDF()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-xl py-5 rounded-3xl flex items-center justify-center gap-3 shadow-[0_10px_25px_rgba(16,185,129,0.3)] active:scale-95 transition-all hidden mb-12 border border-emerald-400">
                <svg class="w-7 h-7" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
                <span>SCAN & SAVE PDF</span>
            </button>

            <div class="w-full h-px bg-gradient-to-r from-transparent via-gray-300 to-transparent my-8"></div>

            <div id="historySection" class="relative">
                <h2 class="text-2xl font-black text-gray-800 mb-5 px-1 flex items-center gap-2.5">
                    <svg class="w-7 h-7 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M15 18a3 3 0 1 0-6 0"/><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M12 13v5"/></svg>
                    Saved Documents
                </h2>
                
                <div id="historyList" class="flex flex-col gap-5"></div>
                
                <div id="emptyHistoryState" class="flex flex-col items-center justify-center py-16 text-gray-400 bg-white/70 rounded-3xl border border-gray-200 hidden shadow-inner">
                    <svg class="w-16 h-16 mb-4 text-gray-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                    <p class="font-medium text-sm text-gray-500">No PDFs generated yet.</p>
                </div>
            </div>

        </main>

        <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment">
        <input type="file" id="fileInput" class="hidden" accept="image/jpeg, image/png, image/webp, image/jpg, image/*" multiple="multiple">
        <input type="file" id="pdfInput" class="hidden" accept="application/pdf">

        <div id="cameraOverlay" class="absolute inset-0 bg-black z-[60] hidden flex-col">
            <div class="h-16 bg-gradient-to-b from-black/80 to-transparent text-white flex items-center justify-between px-4 absolute top-0 left-0 right-0 z-10">
                <button onclick="closeCustomCamera()" class="p-2 rounded-full bg-black/40 backdrop-blur-sm active:scale-95 transition-all"><svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                <button onclick="switchCamera()" class="p-2 rounded-full bg-black/40 backdrop-blur-sm active:scale-95 transition-all"><svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></button>
            </div>
            <div class="flex-1 relative flex items-center justify-center bg-black overflow-hidden">
                <video id="cameraVideo" autoplay playsinline class="w-full h-full object-cover"></video>
            </div>
            <div class="h-36 bg-black pb-safe flex items-center justify-center shrink-0">
                <button onclick="capturePhoto()" class="w-24 h-24 bg-white rounded-full border-[6px] border-gray-600 active:scale-95 transition-all flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                    <div class="w-18 h-18 bg-white border-4 border-gray-300 rounded-full"></div>
                </button>
            </div>
        </div>
        <canvas id="cameraCanvas" class="hidden"></canvas>

        <div id="pdfChoiceModal" class="absolute inset-0 bg-black/60 z-[80] hidden flex-col items-center justify-center p-6">
            <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                <h3 class="text-xl font-black text-gray-800 mb-2">Import PDF Options</h3>
                <p class="text-sm text-gray-500 mb-6">How do you want to process this PDF file?</p>
                <div class="flex flex-col gap-3">
                    <button onclick="executePdfImport('scan')" class="bg-indigo-600 text-white font-bold py-3.5 rounded-2xl shadow-md active:scale-95 transition-all flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
                        Scan & Apply Filters
                    </button>
                    <button onclick="executePdfImport('read')" class="bg-emerald-100 text-emerald-700 border border-emerald-200 font-bold py-3.5 rounded-2xl shadow-sm active:scale-95 transition-all flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        Save Directly as Reader
                    </button>
                    <button onclick="cancelPdfImport()" class="mt-2 text-gray-400 font-bold py-2 active:scale-95 transition-all">Cancel</button>
                </div>
            </div>
        </div>

        <div id="pdfPreviewModal" class="absolute inset-0 bg-gray-100 z-[70] hidden flex-col">
            <header class="bg-indigo-600 px-4 h-16 flex items-center justify-between shadow-md shrink-0 text-white z-20">
                <button onclick="closePdfPreview()" class="p-2.5 rounded-full hover:bg-indigo-700 active:scale-95 transition-all">
                    <svg class="w-7 h-7" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div class="text-center flex flex-col items-center">
                    <span class="font-bold text-sm truncate max-w-[200px]" id="previewTitle">Document Preview</span>
                    <span class="text-[10px] bg-white/20 px-2.5 py-0.5 rounded-full mt-0.5 font-bold" id="previewPageIndicator">1 / 1</span>
                </div>
                <div class="w-10"></div>
            </header>
            
            <div id="pdfViewerContainer" class="flex-1">
                <div id="pdfLoadingText" class="absolute inset-0 flex items-center justify-center text-gray-500 font-bold z-10">Rendering PDF...</div>
                <div id="pdfPagesList">
                    </div>
            </div>
        </div>

        <div id="loadingOverlay" class="absolute inset-0 bg-white/95 backdrop-blur-md z-[100] hidden flex-col items-center justify-center p-6">
            <svg class="w-16 h-16 text-indigo-600 animate-spin mb-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            <h3 id="loadingTitle" class="text-2xl font-black text-gray-900 mb-2">Creating Magic...</h3>
            <p id="loadingDesc" class="text-sm text-gray-500 text-center mb-8 font-medium">Please wait, enhancing resolution and saving safely.</p>
            
            <div class="w-full max-w-xs bg-gray-200 rounded-full h-4 mb-2 overflow-hidden shadow-inner">
                <div id="progressBar" class="bg-indigo-600 h-4 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
            </div>
            <div class="flex justify-between w-full max-w-xs text-sm font-bold text-gray-600">
                <span id="progressTextItem">0 / 0</span>
                <span id="progressTextPercent" class="text-indigo-600">0%</span>
            </div>
        </div>

        <div id="toastContainer" class="absolute top-4 left-4 right-4 z-[110] flex flex-col gap-3 pointer-events-none"></div>
    </div>

    <script>
        // Configure PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // ==========================================
        // DATABASE SETUP (IndexedDB) - Extended robust setup
        // ==========================================
        let db;
        const dbName = "RasScannerDB_V5"; 
        
        function initDB() {
            const request = indexedDB.open(dbName, 1);
            
            request.onerror = (event) => {
                console.error("Database error: ", event.target.error);
                showToast("Local storage error. PDFs might not save correctly.", "error");
            };
            
            request.onupgradeneeded = (event) => {
                db = event.target.result;
                if (!db.objectStoreNames.contains("pdfs")) {
                    db.createObjectStore("pdfs", { keyPath: "id" });
                }
            };
            
            request.onsuccess = (event) => {
                db = event.target.result;
                loadHistoryFiles();
            };
        }
        
        initDB();

        // ==========================================
        // GLOBAL STATE & UI ELEMENTS
        // ==========================================
        let imagesArray = [];
        let tempImportPdfFile = null;

        const ui = {
            mainScroll: document.getElementById('mainScrollView'),
            fileIn: document.getElementById('fileInput'),
            cameraIn: document.getElementById('cameraInput'),
            pdfIn: document.getElementById('pdfInput'),
            grid: document.getElementById('imageGrid'),
            empty: document.getElementById('emptyState'),
            topBtn: document.getElementById('topActionBtn'),
            genBtn: document.getElementById('btnGeneratePDF'),
            historyList: document.getElementById('historyList'),
            emptyHistory: document.getElementById('emptyHistoryState'),
            loading: document.getElementById('loadingOverlay'),
            pBar: document.getElementById('progressBar'),
            pTxtItem: document.getElementById('progressTextItem'),
            pTxtPercent: document.getElementById('progressTextPercent'),
            cameraOverlay: document.getElementById('cameraOverlay'),
            cameraVideo: document.getElementById('cameraVideo'),
            cameraCanvas: document.getElementById('cameraCanvas'),
            pdfPreview: document.getElementById('pdfPreviewModal'),
            pdfTitle: document.getElementById('previewTitle'),
            pdfIndicator: document.getElementById('previewPageIndicator'),
            pdfPagesList: document.getElementById('pdfPagesList'),
            pdfContainer: document.getElementById('pdfViewerContainer'),
            pdfModal: document.getElementById('pdfChoiceModal')
        };

        // ==========================================
        // CAMERA HANDLING
        // ==========================================
        let currentStream = null;
        let useFrontCamera = false;

        async function openCustomCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: useFrontCamera ? "user" : "environment", width: { ideal: 3000 } } 
                });
                ui.cameraVideo.srcObject = currentStream;
                ui.cameraOverlay.classList.replace('hidden', 'flex');
            } catch (err) { 
                showToast("Direct camera blocked, using gallery camera instead.", "info");
                ui.cameraIn.click(); 
            }
        }

        function closeCustomCamera() {
            if(currentStream) currentStream.getTracks().forEach(track => track.stop());
            ui.cameraOverlay.classList.replace('flex', 'hidden');
        }

        function switchCamera() {
            useFrontCamera = !useFrontCamera; 
            closeCustomCamera(); 
            setTimeout(openCustomCamera, 200);
        }

        function capturePhoto() {
            const video = ui.cameraVideo; 
            const canvas = ui.cameraCanvas;
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const gridThumbCanvas = document.createElement('canvas');
            const gTctx = gridThumbCanvas.getContext('2d');
            gridThumbCanvas.width = 150; 
            gridThumbCanvas.height = Math.floor(150 * (video.videoHeight/video.videoWidth));
            gTctx.drawImage(canvas, 0, 0, gridThumbCanvas.width, gridThumbCanvas.height);

            imagesArray.push({ 
                id: Math.random().toString(36).substring(2, 9), 
                file: null, 
                dataUrl: canvas.toDataURL('image/jpeg', 0.95), 
                thumbUrl: gridThumbCanvas.toDataURL('image/jpeg', 0.8) 
            });
            
            closeCustomCamera(); 
            renderImages(); 
            updateUI();
            showToast("Photo captured!", "success");
        }

        // ==========================================
        // FILE & PDF IMPORT SELECTION
        // ==========================================
        ui.fileIn.addEventListener('change', (e) => { processFiles(e.target.files); ui.fileIn.value = ''; });
        ui.cameraIn.addEventListener('change', (e) => { processFiles(e.target.files); ui.cameraIn.value = ''; });
        
        ui.pdfIn.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                tempImportPdfFile = e.target.files[0];
                ui.pdfModal.classList.replace('hidden', 'flex');
            }
            ui.pdfIn.value = '';
        });

        function cancelPdfImport() {
            tempImportPdfFile = null;
            ui.pdfModal.classList.replace('flex', 'hidden');
        }

        // Function: Handle PDF Import logic (Scan vs Read Directly)
        async function executePdfImport(mode) {
            ui.pdfModal.classList.replace('flex', 'hidden');
            if(!tempImportPdfFile) return;

            const file = tempImportPdfFile;
            tempImportPdfFile = null;

            ui.loading.classList.replace('hidden', 'flex');
            document.getElementById('loadingTitle').innerText = "Importing PDF...";
            document.getElementById('loadingDesc').innerText = "Please wait while we process the document.";

            const fileReader = new FileReader();
            
            fileReader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument({data: typedarray}).promise;

                    if (mode === 'scan') {
                        // Extract all pages as images into the Scanner Grid
                        for(let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({scale: 2.0}); 
                            const canvas = document.createElement('canvas');
                            canvas.width = viewport.width; 
                            canvas.height = viewport.height;
                            await page.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise;
                            
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                            
                            const tCanvas = document.createElement('canvas');
                            tCanvas.width = 150; 
                            tCanvas.height = Math.floor(150 * (canvas.height/canvas.width));
                            tCanvas.getContext('2d').drawImage(canvas, 0, 0, tCanvas.width, tCanvas.height);
                            
                            imagesArray.push({
                                id: Math.random().toString(36).substring(2, 9),
                                file: null, 
                                dataUrl: dataUrl, 
                                thumbUrl: tCanvas.toDataURL('image/jpeg', 0.8)
                            });
                        }
                        renderImages(); 
                        updateUI();
                        showToast("PDF imported for scanning!", "success");
                    } else {
                        // DIRECT IMPORT AS READER (Saves immediately to DB)
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({scale: 0.5});
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width; 
                        canvas.height = viewport.height;
                        await page.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise;
                        const thumbUrl = canvas.toDataURL('image/jpeg', 0.8);

                        // We must convert the actual file to Base64 to save in IndexedDB
                        const b64Reader = new FileReader();
                        b64Reader.onload = function() {
                            const record = {
                                id: "doc_" + Date.now(), 
                                name: file.name, 
                                date: new Date().toLocaleString(),
                                pages: pdf.numPages, 
                                thumb: thumbUrl, 
                                pdf: b64Reader.result
                            };
                            
                            // PROPER TRANSACTION LOGIC TO FIX SAVING BUG
                            const transaction = db.transaction(["pdfs"], "readwrite");
                            const store = transaction.objectStore("pdfs");
                            store.put(record);
                            
                            transaction.oncomplete = () => {
                                loadHistoryFiles(); 
                                showToast("Saved directly to Reader History!", "success");
                            };
                            
                            transaction.onerror = (err) => {
                                console.error("DB Save Error:", err);
                                showToast("Failed to save PDF to database.", "error");
                            };
                        };
                        b64Reader.readAsDataURL(file);
                    }
                } catch(e) { 
                    console.error("PDF Processing Error:", e);
                    showToast("Failed to process PDF.", "error"); 
                } finally { 
                    ui.loading.classList.replace('flex', 'hidden'); 
                }
            };
            fileReader.readAsArrayBuffer(file);
        }

        async function processFiles(files) {
            if (!files || files.length === 0) return;
            const filesArray = Array.from(files);
            
            ui.loading.classList.replace('hidden', 'flex');
            document.getElementById('loadingTitle').innerText = "Loading Images...";
            document.getElementById('loadingDesc').innerText = `Processing ${filesArray.length} file(s). Please wait.`;

            try {
                for (let file of filesArray) {
                    if (file.type.match('image.*') || file.name.match(/\.(jpg|jpeg|png|webp)$/i)) {
                        const dataUrl = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (event) => resolve(event.target.result);
                            reader.readAsDataURL(file);
                        });
                        
                        const img = new Image(); 
                        img.src = dataUrl;
                        await new Promise(r => img.onload = r);

                        const gridThumbCanvas = document.createElement('canvas');
                        const gTctx = gridThumbCanvas.getContext('2d');
                        gridThumbCanvas.width = 150; 
                        gridThumbCanvas.height = Math.floor(150 * (img.height/img.width));
                        gTctx.drawImage(img, 0, 0, gridThumbCanvas.width, gridThumbCanvas.height);
                        
                        imagesArray.push({ 
                            id: Math.random().toString(36).substring(2, 9), 
                            file: file, 
                            dataUrl: dataUrl, 
                            thumbUrl: gridThumbCanvas.toDataURL('image/jpeg', 0.7) 
                        });
                    }
                }
                renderImages(); 
                updateUI();
            } catch (error) { 
                showToast('Failed to load some images', 'error'); 
            } finally { 
                ui.loading.classList.replace('flex', 'hidden'); 
            }
        }

        function renderImages() {
            ui.grid.innerHTML = '';
            if (imagesArray.length === 0) return;
            
            imagesArray.forEach((imgObj, index) => {
                const item = document.createElement('div');
                item.className = 'group relative aspect-[3/4] rounded-2xl overflow-hidden bg-white shadow-lg border border-gray-100 p-1.5 transition-all';
                item.innerHTML = `
                    <img src="${imgObj.thumbUrl}" class="w-full h-full object-cover rounded-xl">
                    <button onclick="removeImage('${imgObj.id}')" class="absolute top-2.5 right-2.5 bg-red-600 text-white p-2 rounded-full shadow-lg active:scale-95 transition-all scale-0 group-hover:scale-100"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                    <div class="absolute bottom-2.5 left-2.5 bg-indigo-600 text-white text-xs font-black w-7 h-7 flex items-center justify-center rounded-full shadow-md border-2 border-white">${index + 1}</div>
                `;
                ui.grid.appendChild(item);
            });
        }

        function removeImage(id) { imagesArray = imagesArray.filter(img => img.id !== id); renderImages(); updateUI(); }
        
        function clearAllImages() { 
            if(confirm('Clear current scan grid?')) { 
                imagesArray = []; 
                renderImages(); 
                updateUI(); 
            } 
        }
        
        function updateUI() {
            if (imagesArray.length > 0) { 
                ui.topBtn.classList.replace('hidden', 'flex'); 
                ui.empty.classList.add('hidden');
                ui.genBtn.classList.replace('hidden', 'flex'); 
            } else { 
                ui.topBtn.classList.replace('flex', 'hidden'); 
                ui.empty.classList.remove('hidden');
                ui.genBtn.classList.replace('flex', 'hidden');
            }
        }

        // ==========================================
        // PRO IMAGE PROCESSING: MAGIC PRO WARMTH & SMART CROP
        // ==========================================
        async function processDocumentImage(dataUrl, filterType, applyAutoCrop) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    let targetWidth = img.width; 
                    let targetHeight = img.height;

                    const MAX_DIMENSION = (filterType === 'none') ? 4000 : 3000; 
                    
                    if (filterType !== 'none' && Math.max(targetWidth, targetHeight) < 1500) { 
                        targetWidth *= 2; 
                        targetHeight *= 2; 
                    }
                    
                    if (Math.max(targetWidth, targetHeight) > MAX_DIMENSION) {
                        const ratio = MAX_DIMENSION / Math.max(targetWidth, targetHeight);
                        targetWidth *= ratio; 
                        targetHeight *= ratio;
                    }

                    // 1. SAFE AUTO-CROP
                    let cropX = 0, cropY = 0, cropW = targetWidth, cropH = targetHeight;
                    
                    if (applyAutoCrop) {
                        const thumbW = 100; 
                        const thumbH = Math.floor(100 * (img.height/img.width));
                        const tCanvas = document.createElement('canvas'); 
                        tCanvas.width = thumbW; 
                        tCanvas.height = thumbH;
                        
                        const tCtx = tCanvas.getContext('2d', { willReadFrequently: true }); 
                        tCtx.drawImage(img, 0, 0, thumbW, thumbH);
                        const tData = tCtx.getImageData(0, 0, thumbW, thumbH).data;
                        
                        let top = 0, bottom = thumbH-1, left = 0, right = thumbW-1;
                        
                        const isBorderDark = (isRow, idx) => {
                            let darks = 0, total = 0;
                            if(isRow) { 
                                for(let x=left; x<=right; x++){ 
                                    let i=(idx*thumbW+x)*4; 
                                    if((tData[i]+tData[i+1]+tData[i+2])/3 < 100) darks++; 
                                    total++; 
                                } 
                            } else { 
                                for(let y=top; y<=bottom; y++){ 
                                    let i=(y*thumbW+idx)*4; 
                                    if((tData[i]+tData[i+1]+tData[i+2])/3 < 100) darks++; 
                                    total++; 
                                } 
                            }
                            return (darks/total) > 0.7; 
                        };

                        while(top < thumbH*0.3 && isBorderDark(true, top)) top++;
                        while(bottom > thumbH*0.7 && isBorderDark(true, bottom)) bottom--;
                        while(left < thumbW*0.3 && isBorderDark(false, left)) left++;
                        while(right > thumbW*0.7 && isBorderDark(false, right)) right--;
                        
                        top = Math.min(thumbH/2 - 5, top + 2); 
                        bottom = Math.max(thumbH/2 + 5, bottom - 2);
                        left = Math.min(thumbW/2 - 5, left + 2); 
                        right = Math.max(thumbW/2 + 5, right - 2);

                        if(top >= bottom || left >= right) { 
                            top=0; bottom=thumbH-1; left=0; right=thumbW-1; 
                        }
                        
                        cropX = (left / thumbW) * targetWidth; 
                        cropY = (top / thumbH) * targetHeight;
                        cropW = ((right - left) / thumbW) * targetWidth; 
                        cropH = ((bottom - top) / thumbH) * targetHeight;
                    }

                    // 2. MAIN RENDERING 
                    const canvas = document.createElement('canvas');
                    canvas.width = cropW; 
                    canvas.height = cropH;
                    const ctx = canvas.getContext('2d', { willReadFrequently: true });
                    
                    ctx.fillStyle = '#ffffff'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.imageSmoothingEnabled = true; 
                    ctx.imageSmoothingQuality = 'high';

                    // INITIAL CSS FILTERS 
                    if (filterType === 'magic-pro') {
                        ctx.filter = 'contrast(1.3) brightness(1.1) saturate(1.3)';
                    } else if (filterType === 'print-pro') {
                        ctx.filter = 'contrast(1.4) brightness(1.1) saturate(1.3)';
                    } else if (filterType === 'clear-pro') {
                        ctx.filter = 'contrast(1.4) brightness(1.2) grayscale(100%)';
                    } else if (filterType === 'super-bw') {
                        ctx.filter = 'contrast(1.8) brightness(1.2) grayscale(100%)';
                    }
                    
                    ctx.drawImage(img, cropX * (img.width/targetWidth), cropY * (img.height/targetHeight), cropW * (img.width/targetWidth), cropH * (img.height/targetHeight), 0, 0, cropW, cropH);

                    // 3. SOFT PIXEL THRESHOLDING (Maintains Smooth Text edges + Warm Background)
                    if (filterType !== 'none' && filterType !== 'super-bw') {
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        
                        for (let i = 0; i < data.length; i += 4) {
                            let r=data[i], g=data[i+1], b=data[i+2];
                            let maxC = Math.max(r,g,b), minC = Math.min(r,g,b);
                            let diff = maxC - minC, avg = (r+g+b)/3;

                            if (filterType === 'magic-pro') {
                                if (avg > 150) { 
                                    data[i] = 255; 
                                    data[i+1] = Math.min(255, g + 50); 
                                    data[i+2] = Math.min(240, b + 20); 
                                } else if (avg < 90) {
                                    data[i] = Math.max(0, r - 30);
                                    data[i+1] = Math.max(0, g - 30);
                                    data[i+2] = Math.max(0, b - 40);
                                }
                            } 
                            else if (filterType === 'print-pro') {
                                if (diff < 35) { 
                                    if (avg > 140) { data[i]=255; data[i+1]=255; data[i+2]=255; }
                                    else if (avg < 100) { data[i]=0; data[i+1]=0; data[i+2]=0; }
                                } else { 
                                    if (avg > 180) { data[i]=255; data[i+1]=255; data[i+2]=255; }
                                }
                            }
                            else if (filterType === 'clear-pro') {
                                if (avg > 140) { data[i]=255; data[i+1]=255; data[i+2]=255; } 
                            }
                        }
                        ctx.putImageData(imageData, 0, 0);
                    }

                    let quality = (filterType === 'none') ? 0.98 : 0.95;
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                
                img.onerror = () => {
                    console.error("Failed to load image for processing");
                    resolve(dataUrl); // fallback to original if error occurs
                }
                
                img.src = dataUrl;
            });
        }

        // ==========================================
        // PDF GENERATION LOGIC
        // ==========================================
        async function generatePDF() {
            if (imagesArray.length === 0) return;
            
            ui.loading.classList.replace('hidden', 'flex'); 
            document.getElementById('loadingTitle').innerText = "Creating Magic...";
            ui.pBar.style.width = '0%'; 
            ui.pTxtPercent.innerText = '0%';
            ui.pTxtItem.innerText = `0 / ${imagesArray.length}`;

            await new Promise(r => setTimeout(r, 150)); 

            try {
                const { jsPDF } = window.jspdf;
                const filter = document.getElementById('imageFilter').value;
                const cropSetting = document.getElementById('autoCrop').checked;
                
                let doc = null; 
                const total = imagesArray.length; 
                let thumb = null;

                for (let i = 0; i < total; i++) {
                    const enhancedDataUrl = await processDocumentImage(imagesArray[i].dataUrl, filter, cropSetting);
                    if(i === 0) thumb = enhancedDataUrl;

                    const img = new Image(); 
                    img.src = enhancedDataUrl;
                    await new Promise((resolve) => {
                        img.onload = resolve;
                        img.onerror = resolve; // Continue even if one image fails slightly
                    });

                    const isLandscape = img.width > img.height;

                    if (i === 0) {
                        doc = new jsPDF({ 
                            orientation: isLandscape ? 'l' : 'p', 
                            unit: 'mm', 
                            format: [img.width * 0.264583, img.height * 0.264583], 
                            dpi: 300 
                        });
                    } else {
                        doc.addPage([img.width * 0.264583, img.height * 0.264583], isLandscape ? 'l' : 'p');
                    }
                    
                    doc.addImage(enhancedDataUrl, 'JPEG', 0, 0, img.width * 0.264583, img.height * 0.264583, undefined, 'FAST');

                    // Small pause to free memory in WebView
                    await new Promise(r => setTimeout(r, 50));
                    
                    const pc = Math.round(((i + 1) / total) * 100);
                    ui.pBar.style.width = `${pc}%`; 
                    ui.pTxtPercent.innerText = `${pc}%`; 
                    ui.pTxtItem.innerText = `${i + 1} / ${total}`;
                }

                // OUTPUT & DB SAVE
                const base64Pdf = doc.output('datauristring');
                const now = new Date();
                const id = "doc_" + Date.now();
                const name = `RasScan_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${now.getHours()}${now.getMinutes()}.pdf`;

                const record = { 
                    id, 
                    name, 
                    date: now.toLocaleString(), 
                    pages: total, 
                    thumb, 
                    pdf: base64Pdf 
                };
                
                // PROPER TRANSACTION LOGIC
                const transaction = db.transaction(["pdfs"], "readwrite");
                const store = transaction.objectStore("pdfs");
                store.put(record);
                
                transaction.oncomplete = () => {
                    showToast('PDF Saved successfully!', 'success');
                    imagesArray = []; 
                    renderImages(); 
                    updateUI(); 
                    loadHistoryFiles();
                    
                    setTimeout(() => {
                        const fileEl = document.getElementById(`list_${id}`);
                        if(fileEl) {
                            fileEl.classList.add('highlight-file');
                            ui.mainScroll.scrollTo({ top: fileEl.offsetTop - 10, behavior: 'smooth' });
                        }
                    }, 400);
                };

                transaction.onerror = (err) => {
                    console.error("DB Save Error:", err);
                    showToast('Database error. File might be too large.', 'error');
                };

            } catch (error) { 
                console.error("PDF Generation Error:", error);
                showToast('Error generating PDF.', 'error'); 
            } finally { 
                setTimeout(() => ui.loading.classList.replace('flex', 'hidden'), 600); 
            }
        }

        // ==========================================
        // HISTORY & FILE MANAGEMENT 
        // ==========================================

            const transaction = db.transaction(["pdfs"], "readonly");
            const store = transaction.objectStore("pdfs");

            request.onsuccess = (e) => {
                const files = e.target.result.reverse();
                ui.historyList.innerHTML = '';

                if(files.length === 0) {
                    ui.emptyHistory.classList.remove('hidden'); 
                } else {
                    ui.emptyHistory.classList.add('hidden'); 
                    
                    files.forEach(file => {
                        const el = document.createElement('div');
                        el.id = `list_${file.id}`;
                        el.className = 'bg-white p-5 rounded-3xl shadow-md border border-gray-100 flex flex-col gap-4 transition-all duration-300';
                        el.innerHTML = `
                            <div class="flex items-center gap-4 cursor-pointer" onclick="viewPDF('${file.id}')">
                                <div class="w-16 h-18 bg-gray-100 rounded-xl overflow-hidden shrink-0 border border-gray-100 shadow-inner">
                                    <img src="${file.thumb}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-gray-900 text-sm truncate" id="title_${file.id}">${file.name}</h4>
                                    <p class="text-xs text-gray-400 mt-1">${file.date}</p>
                                    <p class="text-[10px] font-bold text-indigo-700 bg-indigo-50 px-3 py-1 rounded-full inline-block mt-1.5">${file.pages} Pages</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-5 gap-2 pt-3.5 border-t border-gray-100/70">
                                <button onclick="viewPDF('${file.id}')" title="View" class="col-span-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-xl flex items-center justify-center active:scale-95 transition-all"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
                                <button onclick="renamePDF('${file.id}', '${file.name}')" title="Rename" class="col-span-1 bg-orange-50 hover:bg-orange-100 text-orange-600 py-3 rounded-xl flex items-center justify-center active:scale-95 transition-all"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22h6a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v10"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10.4 12.6a2 2 0 1 1 3 3L8 21l-4 1 1-4Z"/></svg></button>
                                <button onclick="sharePDF('${file.id}', '${file.name}')" title="Share" class="col-span-1 bg-green-50 hover:bg-green-100 text-green-700 py-3 rounded-xl flex items-center justify-center active:scale-95 transition-all"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg></button>
                                <button onclick="saveToLocal('${file.id}')" title="Download" class="col-span-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-3 rounded-xl flex items-center justify-center active:scale-95 transition-all"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></button>
                                <button onclick="deletePDF('${file.id}')" title="Delete" class="col-span-1 bg-red-50 hover:bg-red-100 text-red-600 py-3 rounded-xl flex items-center justify-center active:scale-95 transition-all"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>
                            </div>
                        `;
                        ui.historyList.appendChild(el);
                    });
                }
            };
        }

        function deletePDF(id) {
            if(confirm("Confirm to delete this PDF forever?")) {
                const tx = db.transaction(["pdfs"], "readwrite");
                tx.objectStore("pdfs").delete(id);
                
                tx.oncomplete = () => { 
                    loadHistoryFiles(); 
                    showToast('Document deleted.', 'info'); 
                };
                
                tx.onerror = () => {
                    showToast('Failed to delete.', 'error');
                }
            }
        }

        function renamePDF(id, currentName) {
            let baseName = currentName.toLowerCase().endsWith('.pdf') ? currentName.slice(0, -4) : currentName;
            let newName = prompt("Enter new filename:", baseName);
            
            if(newName && newName.trim() !== "" && newName.trim() !== baseName) {
                newName = newName.trim(); 
                if(!newName.toLowerCase().endsWith('.pdf')) newName += '.pdf';
                
                const tx = db.transaction(["pdfs"], "readwrite");
                const store = tx.objectStore("pdfs");
                
                store.get(id).onsuccess = (e) => {
                    const data = e.target.result; 
                    data.name = newName;
                    
                    store.put(data).onsuccess = () => { 
                        loadHistoryFiles(); 
                        showToast('Renamed successfully!', 'success'); 
                    };
                };
            }
        }

        function sharePDF(id, filename) {
            const tx = db.transaction(["pdfs"], "readonly");
            tx.objectStore("pdfs").get(id).onsuccess = async (e) => {
                const file = e.target.result;
                if(!file || !navigator.share) { 
                    showToast('Sharing not supported on this device.', 'error'); 
                    return; 
                }
                
                try {
                    const ia = new Uint8Array(atob(file.pdf.split(',')[1]).split('').map(c=>c.charCodeAt(0)));
                    const fileObj = new File([ia], filename, { type: 'application/pdf' });
                    
                    if (navigator.canShare && navigator.canShare({ files: [fileObj] })) {
                        await navigator.share({ files: [fileObj], title: filename });
                        showToast('Shared successfully!', 'success');
                    } else {
                        showToast('File sharing failed.', 'error');
                    }
                } catch (err) { 
                    if(err.name !== 'AbortError') showToast('Sharing error.', 'error'); 
                }
            };
        }

        function saveToLocal(id) {
            const tx = db.transaction(["pdfs"], "readonly");
            tx.objectStore("pdfs").get(id).onsuccess = (e) => {
                const file = e.target.result;
                if(file) {
                    const link = document.createElement('a'); 
                    link.href = file.pdf; 
                    link.download = file.name; 
                    document.body.appendChild(link); 
                    link.click(); 
                    document.body.removeChild(link);
                }
            };
        }

        // ==========================================
        // PRO PDF VIEWER (NATIVE SCROLL & SMOOTH ZOOM)
        // ==========================================
        let pinchStartWidth = 100;
        let currentViewerZoom = 100;
        let isPinching = false;
        let initialPinchDist = 0;

        function viewPDF(id) {
            const tx = db.transaction(["pdfs"], "readonly");
            tx.objectStore("pdfs").get(id).onsuccess = (e) => {
                const file = e.target.result;
                if(!file) return;
                
                ui.pdfTitle.innerText = file.name;
                ui.pdfPreview.classList.replace('hidden', 'flex');
                ui.pdfPagesList.innerHTML = ''; 
                currentViewerZoom = 100; // Reset width to 100%

                const loading = document.getElementById('pdfLoadingText');
                loading.classList.replace('hidden', 'flex');

                try {
                    const ia = new Uint8Array(atob(file.pdf.split(',')[1]).split('').map(c=>c.charCodeAt(0)));
                    pdfjsLib.getDocument({data: ia}).promise.then(pdf => {
                        loading.classList.replace('flex', 'hidden');
                        ui.pdfIndicator.innerText = `1 / ${pdf.numPages}`;

                        for(let num=1; num<=pdf.numPages; num++) {
                            pdf.getPage(num).then(page => {
                                const vp = page.getViewport({scale: 1.5}); 
                                const canvas = document.createElement('canvas');
                                const ctx = canvas.getContext('2d');
                                canvas.height = vp.height; 
                                canvas.width = vp.width;
                                canvas.className = 'pdf-canvas-page';
                                canvas.style.width = '100%';
                                ui.pdfPagesList.appendChild(canvas);
                                page.render({canvasContext: ctx, viewport: vp});
                            });
                        }
                        setupViewerInteractions(); 
                    }).catch(err => { 
                        loading.innerText = 'Render failed.'; 
                    });
                } catch (err) { 
                    loading.innerText = 'Failed to load PDF.'; 
                }
            };
        }

        function closePdfPreview() {
            ui.pdfPreview.classList.replace('flex', 'hidden');
            ui.pdfPagesList.innerHTML = '';
            ui.pdfContainer.removeEventListener('touchstart', handleTouchStart);
            ui.pdfContainer.removeEventListener('touchmove', handleTouchMove);
            ui.pdfContainer.removeEventListener('touchend', handleTouchEnd);
        }

        function setupViewerInteractions() {
            const cont = ui.pdfContainer;
            cont.addEventListener('touchstart', handleTouchStart, {passive: false});
            cont.addEventListener('touchmove', handleTouchMove, {passive: false});
            cont.addEventListener('touchend', handleTouchEnd, {passive: false});
            
            cont.addEventListener('scroll', () => {
                const canvases = document.querySelectorAll('.pdf-canvas-page');
                const contY = cont.getBoundingClientRect().y;
                for(let i=0; i<canvases.length; i++) {
                    const elY = canvases[i].getBoundingClientRect().y;
                    if (elY > contY - 300 && elY < contY + 300) {
                        ui.pdfIndicator.innerText = `${i+1} / ${canvases.length}`;
                        break;
                    }
                }
            });
        }

        function handleTouchStart(e) {
            if (e.touches.length === 2) {
                isPinching = true;
                initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                pinchStartWidth = currentViewerZoom;
            }
        }
        
        function handleTouchMove(e) {
            if (isPinching && e.touches.length === 2) {
                e.preventDefault(); 
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const scale = dist / initialPinchDist;
                let newWidth = pinchStartWidth * scale;
                
                currentViewerZoom = Math.min(Math.max(100, newWidth), 400); 
                document.querySelectorAll('.pdf-canvas-page').forEach(c => {
                    c.style.width = `${currentViewerZoom}%`;
                });
            }
        }
        
        function handleTouchEnd(e) {
            if (e.touches.length < 2) isPinching = false;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            let icon = type==='error' ? `<svg class="w-6 h-6 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>` : `<svg class="w-6 h-6 text-emerald-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
            toast.className = `toast-enter flex items-center gap-3.5 px-5 py-4 rounded-2xl shadow-xl text-white text-sm font-bold bg-gray-900`;
            toast.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { 
                toast.classList.replace('toast-enter', 'toast-exit'); 
                setTimeout(()=>toast.remove(), 300); 
            }, 3000);
        }
    </script>
</body>
</html>
