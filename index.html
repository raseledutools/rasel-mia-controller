<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    <title>RasScanner Pro</title>
    
    <script src="tailwindcss.js"></script>
    <script src="jspdf.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        
        .toast-enter { animation: slideUp 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .toggle-checkbox:checked { right: 0; border-color: #4F46E5; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4F46E5; }
    </style>
</head>
<body class="bg-slate-800 h-screen w-screen flex justify-center sm:items-center font-sans text-gray-800 overflow-hidden select-none">

    <div class="relative w-full h-full sm:max-w-[400px] sm:h-[800px] sm:max-h-[95vh] bg-white sm:rounded-[2.5rem] sm:shadow-2xl sm:border-[8px] sm:border-gray-900 flex flex-col overflow-hidden">
        
        <header class="bg-indigo-600 px-5 h-16 flex items-center justify-between shadow-md z-30 shrink-0">
            <div class="flex items-center gap-2 text-white">
                <svg class="w-7 h-7 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><circle cx="10" cy="12" r="2"/><path d="m20 17-1.296-1.296a2.41 2.41 0 0 0-3.408 0L9 22"/></svg>
                <span class="font-black text-xl tracking-tight text-white">Ras<span class="text-indigo-200">Scanner</span></span>
            </div>
            <button id="topActionBtn" onclick="clearAllImages()" class="hidden text-xs font-bold text-white bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full active:scale-95 transition-colors">
                Clear Grid
            </button>
        </header>

        <main id="mainScrollView" class="flex-1 overflow-y-auto p-4 pb-20 relative block bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50">
            
            <div class="flex gap-3 mb-5">
                <button onclick="openCustomCamera()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-[0_4px_10px_rgba(79,70,229,0.3)] active:scale-95 transition-transform text-sm">
                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    Open Camera
                </button>
                <button onclick="document.getElementById('fileInput').click()" class="flex-1 bg-white hover:bg-gray-50 border-2 border-indigo-100 text-indigo-700 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-sm active:scale-95 transition-transform text-sm">
                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/><circle cx="9" cy="9" r="2"/><path d="M16 5h6"/><path d="M19 2v6"/></svg>
                    Add Gallery
                </button>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm mb-5 border border-indigo-50">
                <h3 class="font-black text-gray-800 mb-4 text-sm flex items-center gap-2 border-b border-gray-100 pb-2">
                    <svg class="w-5 h-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
                    PDF Generation Settings
                </h3>
                
                <div class="space-y-4">
                    <div class="flex items-center justify-between bg-indigo-50/50 p-3 rounded-xl border border-indigo-100">
                        <label class="text-sm font-bold text-gray-800 flex items-center gap-2" for="autoCrop">
                            <svg class="w-4 h-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
                            Auto Crop Edge
                        </label>
                        <div class="relative inline-block w-12 mr-2 align-middle select-none">
                            <input type="checkbox" id="autoCrop" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10" checked/>
                            <label for="autoCrop" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">Image Filter</label>
                            <div class="relative">
                                <select id="imageFilter" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-900 text-xs font-bold rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 pr-8 outline-none">
                                    <option value="none">Original</option>
                                    <option value="magic" selected>Magic Color (HD)</option>
                                    <option value="pure-bw">Pure B&W</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">Page Size</label>
                            <div class="relative">
                                <select id="pageSize" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-900 text-xs font-bold rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 pr-8 outline-none">
                                    <option value="fit" selected>Fit to Image</option>
                                    <option value="a4">A4 Size</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="imageGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">
                <div id="emptyState" class="col-span-full flex flex-col items-center justify-center py-16 text-gray-500 bg-white/60 rounded-2xl border-2 border-dashed border-gray-300">
                    <div class="w-16 h-16 bg-white/80 text-indigo-400 rounded-full flex items-center justify-center mb-3 shadow-sm border border-indigo-50">
                        <svg class="w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    </div>
                    <h3 class="font-bold text-lg text-gray-700">No Images Selected</h3>
                    <p class="text-xs mt-1 text-center font-medium text-gray-500">Capture from camera or select from gallery.</p>
                </div>
            </div>

            <button id="btnGeneratePDF" onclick="generatePDF()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-lg py-4 rounded-2xl flex items-center justify-center gap-2 shadow-[0_8px_20px_rgba(16,185,129,0.3)] active:scale-95 transition-transform hidden mb-8 border border-emerald-400">
                <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
                <span>SCAN NOW (CREATE PDF)</span>
            </button>

            <div class="w-full h-px bg-gradient-to-r from-transparent via-gray-300 to-transparent my-8"></div>

            <h2 class="text-xl font-black text-gray-800 mb-4 px-1 flex items-center gap-2">
                <svg class="w-6 h-6 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M15 18a3 3 0 1 0-6 0"/><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M12 13v5"/></svg>
                Saved Documents
            </h2>
            
            <div id="historyList" class="flex flex-col gap-4"></div>
            
            <div id="emptyHistoryState" class="flex flex-col items-center justify-center py-12 text-gray-400 bg-white/50 rounded-2xl border border-gray-200 hidden">
                <svg class="w-12 h-12 mb-3 text-gray-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                <p class="font-medium text-sm text-gray-500">No PDFs generated yet.</p>
            </div>

        </main>

        <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment">
        <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>

        <div id="cameraOverlay" class="absolute inset-0 bg-black z-[60] hidden flex-col">
            <div class="h-16 bg-gradient-to-b from-black/80 to-transparent text-white flex items-center justify-between px-4 absolute top-0 left-0 right-0 z-10">
                <button onclick="closeCustomCamera()" class="p-2 rounded-full bg-black/40 backdrop-blur-sm active:scale-95 transition-transform"><svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                <button onclick="switchCamera()" class="p-2 rounded-full bg-black/40 backdrop-blur-sm active:scale-95 transition-transform"><svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></button>
            </div>
            <div class="flex-1 relative flex items-center justify-center bg-black overflow-hidden">
                <video id="cameraVideo" autoplay playsinline class="w-full h-full object-cover"></video>
            </div>
            <div class="h-32 bg-black pb-safe flex items-center justify-center shrink-0">
                <button onclick="capturePhoto()" class="w-20 h-20 bg-white rounded-full border-4 border-gray-500 active:scale-95 transition-transform flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                    <div class="w-16 h-16 bg-white border-2 border-gray-300 rounded-full"></div>
                </button>
            </div>
        </div>
        <canvas id="cameraCanvas" class="hidden"></canvas>

        <div id="pdfPreviewModal" class="absolute inset-0 bg-gray-100 z-[70] hidden flex-col">
            <header class="bg-indigo-600 px-4 h-14 flex items-center justify-between shadow-md shrink-0 text-white z-10">
                <button onclick="closePdfPreview()" class="p-2 rounded-full hover:bg-indigo-700 transition-colors">
                    <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <span class="font-bold text-sm truncate max-w-[200px]" id="previewTitle">Document Preview</span>
                <div class="w-10"></div>
            </header>
            
            <div id="pdfRenderContainer" class="flex-1 overflow-y-auto p-4 flex flex-col items-center gap-4 relative">
                <div id="pdfLoadingText" class="text-gray-500 font-bold mt-10">Rendering PDF...</div>
            </div>
        </div>

        <div id="loadingOverlay" class="absolute inset-0 bg-white/95 backdrop-blur-md z-[100] hidden flex-col items-center justify-center p-6">
            <svg class="w-16 h-16 text-indigo-600 animate-spin mb-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            <h3 class="text-2xl font-black text-gray-900 mb-2">Creating Magic...</h3>
            <p class="text-sm text-gray-500 text-center mb-8 font-medium">Please wait, enhancing resolution and saving safely.</p>
            
            <div class="w-full max-w-xs bg-gray-200 rounded-full h-4 mb-2 overflow-hidden shadow-inner">
                <div id="progressBar" class="bg-indigo-600 h-4 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
            </div>
            <div class="flex justify-between w-full max-w-xs text-sm font-bold text-gray-600">
                <span id="progressTextItem">0 / 0</span>
                <span id="progressTextPercent" class="text-indigo-600">0%</span>
            </div>
        </div>

        <div id="toastContainer" class="absolute top-4 left-4 right-4 z-[110] flex flex-col gap-2 pointer-events-none"></div>
    </div>

    <script>
        // Configure PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // DATABASE SETUP
        let db;
        const dbName = "RasScannerDB";
        
        function initDB() {
            const request = indexedDB.open(dbName, 1);
            request.onerror = (e) => showToast("Storage error", "error");
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains("pdfs")) db.createObjectStore("pdfs", { keyPath: "id" });
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                loadHistoryFiles();
            };
        }
        initDB();

        // UI MANAGEMENT
        let imagesArray = [];
        const fileInput = document.getElementById('fileInput');
        const cameraInput = document.getElementById('cameraInput');
        const imageGrid = document.getElementById('imageGrid');
        const emptyState = document.getElementById('emptyState');
        const topActionBtn = document.getElementById('topActionBtn');
        const btnGeneratePDF = document.getElementById('btnGeneratePDF');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // CAMERA
        let currentStream = null;
        let useFrontCamera = false;

        async function openCustomCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFrontCamera ? "user" : "environment" }});
                document.getElementById('cameraVideo').srcObject = currentStream;
                document.getElementById('cameraOverlay').classList.remove('hidden');
                document.getElementById('cameraOverlay').classList.add('flex');
            } catch (err) {
                document.getElementById('cameraInput').click(); // Fallback for APK
            }
        }

        function closeCustomCamera() {
            if(currentStream) currentStream.getTracks().forEach(track => track.stop());
            document.getElementById('cameraOverlay').classList.add('hidden');
            document.getElementById('cameraOverlay').classList.remove('flex');
        }

        function switchCamera() {
            useFrontCamera = !useFrontCamera;
            closeCustomCamera();
            setTimeout(openCustomCamera, 200);
        }

        function capturePhoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('cameraCanvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            imagesArray.push({ id: Math.random().toString(36).substr(2, 9), file: null, dataUrl: canvas.toDataURL('image/jpeg', 0.9) });
            closeCustomCamera(); renderImages(); updateUI();
            showToast("Captured successfully!", "success");
        }

        // SEQUENCE FIXED IMPORT
        fileInput.addEventListener('change', (e) => { processFiles(e.target.files); fileInput.value = ''; }, false);
        cameraInput.addEventListener('change', (e) => { processFiles(e.target.files); cameraInput.value = ''; }, false);

        async function processFiles(files) {
            const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/jpg'];
            let newImagesCount = 0;
            const filesArray = Array.from(files).sort((a, b) => files.indexOf(a) - files.indexOf(b));

            for (const file of filesArray) {
                if (validTypes.includes(file.type)) {
                    const reader = new FileReader();
                    const dataUrl = await new Promise((resolve) => {
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                    imagesArray.push({ id: Math.random().toString(36).substr(2, 9), file: file, dataUrl: dataUrl });
                    newImagesCount++;
                    renderImages(); updateUI();
                }
            }
            if (newImagesCount > 0) showToast(`${newImagesCount} image(s) loaded`, 'success');
        }

        function renderImages() {
            imageGrid.innerHTML = '';
            if (imagesArray.length === 0) return;
            imagesArray.forEach((imgObj, index) => {
                const item = document.createElement('div');
                item.className = 'group relative aspect-[3/4] rounded-2xl overflow-hidden bg-gray-200 shadow-sm border border-white/50 shadow-md';
                item.innerHTML = `
                    <img src="${imgObj.dataUrl}" class="w-full h-full object-cover">
                    <button onclick="removeImage('${imgObj.id}')" class="absolute top-2 right-2 bg-white/90 text-red-500 p-2 rounded-full shadow-md"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg></button>
                    <div class="absolute bottom-2 left-2 bg-indigo-600 text-white text-xs font-black w-6 h-6 flex items-center justify-center rounded-full shadow-md border-2 border-white">${index + 1}</div>
                `;
                imageGrid.appendChild(item);
            });
        }

        function removeImage(id) { imagesArray = imagesArray.filter(img => img.id !== id); renderImages(); updateUI(); }
        function clearAllImages() { if(confirm('Clear the grid?')) { imagesArray = []; renderImages(); updateUI(); } }
        
        function updateUI() {
            if (imagesArray.length > 0) { 
                topActionBtn.classList.remove('hidden'); emptyState.classList.add('hidden'); emptyState.classList.remove('flex');
                btnGeneratePDF.classList.remove('hidden'); btnGeneratePDF.classList.add('flex');
            } else { 
                topActionBtn.classList.add('hidden'); emptyState.classList.remove('hidden'); emptyState.classList.add('flex');
                btnGeneratePDF.classList.add('hidden'); btnGeneratePDF.classList.remove('flex');
            }
        }

        // SMART CROP & FILTER
        async function processDocumentImage(dataUrl, filterType, applyAutoCrop) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    let canvas = document.createElement('canvas');
                    let ctx = canvas.getContext('2d', { willReadFrequently: true });
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (filterType === 'magic') ctx.filter = 'contrast(1.4) brightness(1.2) saturate(1.3)';
                    else if (filterType === 'pure-bw') ctx.filter = 'grayscale(100%) contrast(1.4) brightness(1.1)';
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    if (filterType === 'pure-bw') {
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                            const newVal = avg > 140 ? 255 : 0;
                            data[i] = newVal; data[i+1] = newVal; data[i+2] = newVal;
                        }
                        ctx.putImageData(imageData, 0, 0);
                    }
                        
                    if (applyAutoCrop) {
                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imgData.data;
                        const w = canvas.width; const h = canvas.height;
                        let minX = w, minY = h, maxX = 0, maxY = 0;
                        for(let x = 0; x < w; x++) {
                            for(let y = 0; y < h; y++) {
                                const i = (y * w + x) * 4;
                                if(data[i] < 128) {
                                    if(x < minX) minX = x; if(y < minY) minY = y;
                                    if(x > maxX) maxX = x; if(y > maxY) maxY = y;
                                }
                            }
                        }
                        const cropWidth = maxX - minX; const cropHeight = maxY - minY;
                        if (cropWidth > 0 && cropHeight > 0) {
                            const margin = Math.floor(Math.max(cropWidth, cropHeight) * 0.04);
                            let croppedCanvas = document.createElement('canvas');
                            croppedCanvas.width = cropWidth + (margin * 2); croppedCanvas.height = cropHeight + (margin * 2);
                            let cropCtx = croppedCanvas.getContext('2d');
                            cropCtx.fillStyle = '#ffffff'; cropCtx.fillRect(0, 0, croppedCanvas.width, croppedCanvas.height);
                            cropCtx.drawImage(canvas, minX, minY, cropWidth, cropHeight, margin, margin, cropWidth, cropHeight);
                            canvas = croppedCanvas;
                        }
                    }
                    resolve(canvas.toDataURL('image/jpeg', 0.9)); 
                };
                img.src = dataUrl;
            });
        }

        // GENERATE PDF (HIGH DPI 300)
        async function generatePDF() {
            if (imagesArray.length === 0) return;
            loadingOverlay.classList.remove('hidden'); loadingOverlay.classList.add('flex');
            
            const progressBar = document.getElementById('progressBar');
            const progressTextPercent = document.getElementById('progressTextPercent');
            const progressTextItem = document.getElementById('progressTextItem');
            
            progressBar.style.width = '0%'; progressTextPercent.innerText = '0%';
            progressTextItem.innerText = `0 / ${imagesArray.length}`;

            await new Promise(r => setTimeout(r, 50)); 

            try {
                const { jsPDF } = window.jspdf;
                const layoutType = document.getElementById('pageSize').value;
                const filterType = document.getElementById('imageFilter').value;
                const doAutoCrop = document.getElementById('autoCrop').checked;
                
                let doc = null; const totalImages = imagesArray.length; let firstPageThumb = null;

                for (let i = 0; i < totalImages; i++) {
                    const processedDataUrl = await processDocumentImage(imagesArray[i].dataUrl, filterType, doAutoCrop);
                    if(i === 0) firstPageThumb = processedDataUrl;

                    const img = new Image(); img.src = processedDataUrl;
                    await new Promise(resolve => img.onload = resolve);

                    const pxToMm = 0.264583;
                    let imgWidthMm = img.width * pxToMm; let imgHeightMm = img.height * pxToMm;
                    let orientation = imgWidthMm > imgHeightMm ? 'landscape' : 'portrait';

                    if (layoutType === 'fit') {
                        if (i === 0) doc = new jsPDF({ orientation: orientation, unit: 'mm', format: [imgWidthMm, imgHeightMm], dpi: 300 }); 
                        else doc.addPage([imgWidthMm, imgHeightMm], orientation);
                        doc.addImage(processedDataUrl, 'JPEG', 0, 0, imgWidthMm, imgHeightMm, undefined, 'FAST');
                    } else {
                        let format = layoutType === 'a4' ? 'a4' : 'letter';
                        if (i === 0) doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: format, dpi: 300 }); 
                        else doc.addPage(format, 'portrait');

                        let pdfPageWidth = doc.internal.pageSize.getWidth(); let pdfPageHeight = doc.internal.pageSize.getHeight();
                        let imgRatio = img.width / img.height; let pageRatio = pdfPageWidth / pdfPageHeight;
                        let finalWidth = pdfPageWidth; let finalHeight = pdfPageHeight;

                        if (imgRatio > pageRatio) finalHeight = pdfPageWidth / imgRatio;
                        else finalWidth = pdfPageHeight * imgRatio;

                        let finalX = (pdfPageWidth - finalWidth) / 2; let finalY = (pdfPageHeight - finalHeight) / 2;
                        doc.addImage(processedDataUrl, 'JPEG', finalX, finalY, finalWidth, finalHeight, undefined, 'FAST');
                    }

                    let currentPercent = Math.round(((i + 1) / totalImages) * 100);
                    progressBar.style.width = `${currentPercent}%`; progressTextPercent.innerText = `${currentPercent}%`;
                    progressTextItem.innerText = `${i + 1} / ${totalImages}`;
                    await new Promise(r => setTimeout(r, 10)); 
                }

                const pdfDataUri = doc.output('datauristring');
                const d = new Date();
                const fileName = `RasScanner_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${d.getHours()}${d.getMinutes()}.pdf`;

                const newRecord = {
                    id: "doc_" + Date.now(), name: fileName, date: d.toLocaleString(),
                    pageCount: totalImages, thumb: firstPageThumb, pdfData: pdfDataUri
                };

                const transaction = db.transaction(["pdfs"], "readwrite");
                transaction.objectStore("pdfs").put(newRecord);
                
                transaction.oncomplete = () => {
                    showToast('Saved successfully to History!', 'success');
                    imagesArray = []; renderImages(); updateUI(); loadHistoryFiles();
                    const mainScroll = document.getElementById('mainScrollView');
                    mainScroll.scrollTo({ top: mainScroll.scrollHeight, behavior: 'smooth' });
                };
            } catch (error) { showToast('Error generating PDF', 'error'); } 
            finally {
                setTimeout(() => { loadingOverlay.classList.add('hidden'); loadingOverlay.classList.remove('flex'); }, 500);
            }
        }

        // HISTORY & FILE MANAGEMENT
        function loadHistoryFiles() {
            if(!db) return;
            const historyList = document.getElementById('historyList');
            const emptyHistoryState = document.getElementById('emptyHistoryState');
            
            db.transaction(["pdfs"], "readonly").objectStore("pdfs").getAll().onsuccess = (event) => {
                const files = event.target.result.reverse();
                historyList.innerHTML = '';

                if(files.length === 0) {
                    emptyHistoryState.classList.remove('hidden'); emptyHistoryState.classList.add('flex');
                } else {
                    emptyHistoryState.classList.add('hidden'); emptyHistoryState.classList.remove('flex');
                    files.forEach(file => {
                        const item = document.createElement('div');
                        item.className = 'bg-white p-4 rounded-2xl shadow-sm border border-indigo-50 flex flex-col gap-3';
                        item.innerHTML = `
                            <div class="flex items-center gap-4 cursor-pointer" onclick="viewPDF('${file.id}')">
                                <div class="w-14 h-16 bg-gray-200 rounded-lg overflow-hidden shrink-0 shadow-sm border border-gray-200"><img src="${file.thumb}" class="w-full h-full object-cover"></div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-gray-800 text-sm truncate">${file.name}</h4>
                                    <p class="text-xs text-gray-500 mt-0.5">${file.date}</p>
                                    <p class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full inline-block mt-1">${file.pageCount} Pages</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-5 gap-2 pt-2 border-t border-gray-50">
                                <button onclick="viewPDF('${file.id}')" title="View" class="col-span-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-xl flex items-center justify-center transition-colors"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
                                <button onclick="renamePDF('${file.id}', '${file.name}')" title="Rename" class="col-span-1 bg-orange-50 hover:bg-orange-100 text-orange-600 font-bold py-2 rounded-xl flex items-center justify-center transition-colors"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22h6a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v10"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10.4 12.6a2 2 0 1 1 3 3L8 21l-4 1 1-4Z"/></svg></button>
                                <button onclick="sharePDF('${file.id}', '${file.name}')" title="Share" class="col-span-1 bg-green-50 hover:bg-green-100 text-green-600 font-bold py-2 rounded-xl flex items-center justify-center transition-colors"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg></button>
                                <button onclick="saveToLocal('${file.id}', '${file.name}')" title="Download" class="col-span-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold py-2 rounded-xl flex items-center justify-center transition-colors"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></button>
                                <button onclick="deletePDF('${file.id}')" title="Delete" class="col-span-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2 rounded-xl flex items-center justify-center transition-colors"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg></button>
                            </div>
                        `;
                        historyList.appendChild(item);
                    });
                }
            };
        }

        // VIEW PDF INSIDE APK (Using PDF.js to bypass WebView iframe restriction)
        function viewPDF(id) {
            db.transaction(["pdfs"], "readonly").objectStore("pdfs").get(id).onsuccess = (e) => {
                const file = e.target.result;
                if(file && file.pdfData) {
                    document.getElementById('previewTitle').innerText = file.name;
                    document.getElementById('pdfPreviewModal').classList.remove('hidden');
                    document.getElementById('pdfPreviewModal').classList.add('flex');
                    
                    const container = document.getElementById('pdfRenderContainer');
                    container.innerHTML = '<div class="text-gray-500 font-bold mt-10">Rendering PDF...</div>';

                    try {
                        // Extract base64 part
                        const base64Data = file.pdfData.split(',')[1];
                        const pdfData = atob(base64Data);
                        const uint8Array = new Uint8Array(pdfData.length);
                        for (let i = 0; i < pdfData.length; i++) {
                            uint8Array[i] = pdfData.charCodeAt(i);
                        }

                        // Load and render PDF
                        pdfjsLib.getDocument({data: uint8Array}).promise.then(pdf => {
                            container.innerHTML = ''; // clear loading
                            for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                                pdf.getPage(pageNum).then(page => {
                                    const viewport = page.getViewport({scale: 1.5}); // Adjust scale for mobile
                                    const canvas = document.createElement('canvas');
                                    const context = canvas.getContext('2d');
                                    canvas.height = viewport.height;
                                    canvas.width = viewport.width;
                                    canvas.className = 'w-full max-w-lg h-auto shadow-md mb-3 bg-white';
                                    container.appendChild(canvas);
                                    page.render({canvasContext: context, viewport: viewport});
                                });
                            }
                        }).catch(err => {
                            container.innerHTML = '<div class="text-red-500 mt-10">Failed to render PDF preview.</div>';
                        });
                    } catch (err) {
                        container.innerHTML = '<div class="text-red-500 mt-10">Failed to read PDF data.</div>';
                    }
                }
            };
        }

        function closePdfPreview() {
            document.getElementById('pdfPreviewModal').classList.add('hidden');
            document.getElementById('pdfPreviewModal').classList.remove('flex');
            document.getElementById('pdfRenderContainer').innerHTML = ''; // clear memory
        }

        // RENAME PDF
        function renamePDF(id, currentName) {
            let baseName = currentName.endsWith('.pdf') ? currentName.slice(0, -4) : currentName;
            let newName = prompt("Enter new name for the document:", baseName);
            if(newName && newName.trim() !== "" && newName !== baseName) {
                if(!newName.toLowerCase().endsWith('.pdf')) newName += '.pdf';
                const store = db.transaction(["pdfs"], "readwrite").objectStore("pdfs");
                store.get(id).onsuccess = (e) => {
                    const data = e.target.result; data.name = newName;
                    store.put(data).onsuccess = () => { loadHistoryFiles(); showToast('Document renamed', 'success'); };
                };
            }
        }

        // SHARE PDF
        async function sharePDF(id, filename) {
            db.transaction(["pdfs"], "readonly").objectStore("pdfs").get(id).onsuccess = async (e) => {
                const file = e.target.result;
                if(file && file.pdfData) {
                    try {
                        const blob = dataURItoBlob(file.pdfData);
                        const fileObj = new File([blob], filename, { type: 'application/pdf' });
                        if (navigator.canShare && navigator.canShare({ files: [fileObj] })) {
                            await navigator.share({ files: [fileObj], title: filename });
                            showToast('Shared successfully!', 'success');
                        } else showToast('Direct sharing not supported.', 'error');
                    } catch (err) { if(err.name !== 'AbortError') showToast('Error sharing file.', 'error'); }
                }
            };
        }

        // PROPER NAME DOWNLOAD
        function saveToLocal(id, filename) {
            db.transaction(["pdfs"], "readonly").objectStore("pdfs").get(id).onsuccess = (e) => {
                const file = e.target.result;
                if(file && file.pdfData) {
                    const link = document.createElement('a');
                    link.href = file.pdfData; link.download = filename; // This ensures the proper name
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                }
            };
        }

        function dataURItoBlob(dataURI) {
            const splitDataURI = dataURI.split(',');
            const byteString = splitDataURI[0].indexOf('base64') >= 0 ? atob(splitDataURI[1]) : decodeURI(splitDataURI[1]);
            const mimeString = splitDataURI[0].split(':')[1].split(';')[0];
            const ia = new Uint8Array(byteString.length);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            return new Blob([ia], { type: mimeString });
        }

        function deletePDF(id) {
            if(confirm("Delete this document forever?")) {
                db.transaction(["pdfs"], "readwrite").objectStore("pdfs").delete(id).oncomplete = () => { loadHistoryFiles(); showToast('Document deleted', 'info'); };
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            let icon = type === 'error' ? `<svg class="w-5 h-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>` : `<svg class="w-5 h-5 text-emerald-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3.5 rounded-2xl shadow-xl text-white text-sm font-bold bg-gray-900`;
            toast.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
